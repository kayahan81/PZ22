services:
  postgres:
    image: postgres:15-alpine
    container_name: tasks_db
    environment:
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_pass
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../services/tasks/internal/migration:/docker-entrypoint-initdb.d
    networks:
      - tasks_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  tasks:
    build:
      context: ../../
      dockerfile: services/tasks/Dockerfile
    container_name: tasks_service
    environment:
      TASKS_PORT: "8082"
      AUTH_GRPC_ADDR: "host.docker.internal:50051"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: tasks_user
      DB_PASSWORD: tasks_pass
      DB_NAME: tasks_db
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy 
    networks:
      - tasks_network

  nginx:
    image: nginx:alpine
    container_name: nginx_tls
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/nginx/tls/cert.pem:ro
      - ./key.pem:/etc/nginx/tls/key.pem:ro
    depends_on:
      tasks:
        condition: service_started
    networks:
      - tasks_network

networks:
  tasks_network:
    driver: bridge

volumes:
  postgres_data: